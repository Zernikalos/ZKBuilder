syntax = "proto2";

package Zko;

enum ZkLightType {
  DIRECTIONAL = 0;
  POINT = 1;
  SPOT = 2;
  AMBIENT = 3;
}

message ZkLight {
  required string id = 1;
  required string name = 2;

  required ZkTransform transform = 3;

  required ZkColor color = 5;
  required float intensity = 6;

  oneof lamp {
    ZkDirectionalLamp directionalLamp = 10;
    ZkPointLamp pointLamp = 11;
    ZkSpotLamp spotLamp = 12;
    ZkAmbientLamp ambientLamp = 13;
  }

  // Future: shadows
  // optional ZkShadowSettings shadow = 20;
}

message ZkDirectionalLamp {
  required ZkLightType lampType = 1;
}

message ZkAmbientLamp {
  required ZkLightType lampType = 1;
}

message ZkPointLamp {
  required ZkLightType lampType = 1;
  optional float range = 2;
  optional float decay = 3;
}

message ZkSpotLamp {
  required ZkLightType lampType = 1;
  optional float range = 2;
  optional float decay = 3;
  optional float innerAngle = 4;
  optional float outerAngle = 5;
}

