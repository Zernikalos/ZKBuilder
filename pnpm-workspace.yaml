packages:
  - packages/zkbuilder
  - packages/zkbuilder-cli

managePackageManagerVersions: true

# Supply chain protection (pnpm 11 defaults; explicit for clarity)
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@zernikalos/*'

blockExoticSubdeps: true
strictDepBuilds: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - '@zernikalos/*'
trustPolicyIgnoreAfter: 10080

verifyDepsBeforeRun: install

# Explicit lifecycle-script allowlist (strictDepBuilds defaults to true)
allowBuilds:
  protobufjs: true
  esbuild: false
  nx: false

# Temporary: force patched transitive deps from lerna → nx / node-gyp.
# Remove once lerna ships updated nx/npmcli dependency trees.
overrides:
  "tmp@<0.2.6": ">=0.2.6"
  "form-data@<4.0.6": ">=4.0.6"
  "undici@<6.27.0": ">=6.27.0"
